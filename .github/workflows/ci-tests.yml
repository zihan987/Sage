name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Core Backend Regression Suite
        run: |
          python -m pytest tests/app/server -v

  web-tests:
    name: Web Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/server/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/server/web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Check Frontend I18n Literals
        run: npm run check:i18n

      - name: Run Vitest
        run: npm test -- --run

  desktop-i18n:
    name: Desktop UI i18n keys
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/desktop/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/desktop/ui/package-lock.json

      - name: Install Desktop UI Dependencies
        run: npm ci

      - name: Check Desktop i18n keys (zh / en)
        run: npm run check:i18n

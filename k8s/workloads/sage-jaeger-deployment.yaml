apiVersion: apps/v1
kind: Deployment
metadata:
  name: sage-jaeger
  labels:
    app.kubernetes.io/name: sage-jaeger
    app.kubernetes.io/part-of: sage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sage-jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sage-jaeger
        app.kubernetes.io/part-of: sage
    spec:
      containers:
        - name: sage-jaeger
          image: docker.m.daocloud.io/jaegertracing/jaeger:2.16.0
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/jaeger/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: query
              containerPort: 16686
            - name: health
              containerPort: 13133
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: jaeger-config
              mountPath: /etc/jaeger/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: jaeger-config
          configMap:
            name: sage-jaeger-config

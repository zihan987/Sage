apiVersion: apps/v1
kind: Deployment
metadata:
  name: sage-wiki
  labels:
    app.kubernetes.io/name: sage-wiki
    app.kubernetes.io/part-of: sage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sage-wiki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sage-wiki
        app.kubernetes.io/part-of: sage
    spec:
      containers:
        - name: sage-wiki
          image: "${SAGE_WIKI_IMAGE}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30

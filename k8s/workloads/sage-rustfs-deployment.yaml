apiVersion: apps/v1
kind: Deployment
metadata:
  name: sage-rustfs
  labels:
    app.kubernetes.io/name: sage-rustfs
    app.kubernetes.io/part-of: sage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sage-rustfs
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sage-rustfs
        app.kubernetes.io/part-of: sage
    spec:
      containers:
        - name: sage-rustfs
          image: docker.m.daocloud.io/rustfs/rustfs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: RUSTFS_ADDRESS
              value: 0.0.0.0:9000
            - name: RUSTFS_CONSOLE_ADDRESS
              value: 0.0.0.0:9001
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_CORS_ALLOWED_ORIGINS
              value: "*"
            - name: RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS
              value: "*"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sage-secrets
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sage-secrets
                  key: RUSTFS_SECRET_KEY
            - name: RUSTFS_OBS_LOGGER_LEVEL
              value: info
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 40
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 90
            periodSeconds: 30

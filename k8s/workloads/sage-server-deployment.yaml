apiVersion: apps/v1
kind: Deployment
metadata:
  name: sage-server
  labels:
    app.kubernetes.io/name: sage-server
    app.kubernetes.io/part-of: sage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sage-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sage-server
        app.kubernetes.io/part-of: sage
    spec:
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
        - name: sage-server
          image: "${SAGE_SERVER_IMAGE}"
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: sage-config
            - secretRef:
                name: sage-secrets
          securityContext:
            allowPrivilegeEscalation: true
            appArmorProfile:
              type: Unconfined
            capabilities:
              add:
                - SYS_ADMIN
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 16Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /active
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6

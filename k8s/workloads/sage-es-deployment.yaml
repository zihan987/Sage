apiVersion: apps/v1
kind: Deployment
metadata:
  name: sage-es
  labels:
    app.kubernetes.io/name: sage-es
    app.kubernetes.io/part-of: sage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sage-es
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sage-es
        app.kubernetes.io/part-of: sage
    spec:
      initContainers:
        - name: set-vm-max-map-count
          image: docker.m.daocloud.io/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - sysctl -w vm.max_map_count=262144 || true
          securityContext:
            privileged: true
      containers:
        - name: sage-es
          image: "${SAGE_ES_IMAGE}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: bootstrap.memory_lock
              value: "true"
            - name: xpack.security.enabled
              value: "false"
            - name: TAKE_FILE_OWNERSHIP
              value: "true"
            - name: ES_JAVA_OPTS
              value: "-Xms1024m -Xmx1024m"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sage-secrets
                  key: ELASTIC_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: es-data
          persistentVolumeClaim:
            claimName: sage-es-data

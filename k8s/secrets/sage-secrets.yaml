apiVersion: v1
kind: Secret
metadata:
  name: sage-secrets
  labels:
    app.kubernetes.io/name: sage
    app.kubernetes.io/part-of: sage
type: Opaque
stringData:
  SAGE_BOOTSTRAP_ADMIN_USERNAME: "${SAGE_BOOTSTRAP_ADMIN_USERNAME}"
  SAGE_BOOTSTRAP_ADMIN_PASSWORD: "${SAGE_BOOTSTRAP_ADMIN_PASSWORD}"
  SAGE_JWT_KEY: "${SAGE_JWT_KEY}"
  SAGE_REFRESH_TOKEN_SECRET: "${SAGE_REFRESH_TOKEN_SECRET}"
  SAGE_SESSION_SECRET: "${SAGE_SESSION_SECRET}"
  OPENSANDBOX_API_KEY: "${OPENSANDBOX_API_KEY}"
  SAGE_EML_ACCESS_KEY_ID: "${SAGE_EML_ACCESS_KEY_ID}"
  SAGE_EML_ACCESS_KEY_SECRET: "${SAGE_EML_ACCESS_KEY_SECRET}"
  SAGE_EML_SECURITY_TOKEN: "${SAGE_EML_SECURITY_TOKEN}"
  SAGE_DEFAULT_LLM_API_KEY: "${SAGE_DEFAULT_LLM_API_KEY}"
  SAGE_MYSQL_PASSWORD: "${SAGE_MYSQL_PASSWORD}"
  MYSQL_ROOT_PASSWORD: "${SAGE_MYSQL_PASSWORD}"
  SAGE_ELASTICSEARCH_PASSWORD: "${SAGE_ELASTICSEARCH_PASSWORD}"
  SAGE_S3_ACCESS_KEY: "${SAGE_S3_ACCESS_KEY}"
  RUSTFS_ACCESS_KEY: "${SAGE_S3_ACCESS_KEY}"
  SAGE_S3_SECRET_KEY: "${SAGE_S3_SECRET_KEY}"
  RUSTFS_SECRET_KEY: "${SAGE_S3_SECRET_KEY}"
  SAGE_EMBEDDING_API_KEY: "${SAGE_EMBEDDING_API_KEY}"
